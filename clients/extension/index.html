<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon128.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vultisig Extension</title>
  </head>
  <body>
    <div id="root">
      <div id="preload-spinner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100vh;background:#101114;font-family:system-ui,sans-serif;">
        <style>
          @keyframes vs-spin { to { transform: rotate(360deg) } }
          #preload-spinner svg { animation: vs-spin 1s linear infinite; }
        </style>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#33e6bf" stroke-width="2" stroke-linecap="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
        <div id="load-status" style="color:#8a8f98;font-size:12px;">Loading scripts...</div>
      </div>
    </div>
    <script src="preload.js"></script>
    <script type="module" src="/src/pages/index.tsx"></script>
  </body>
</html>
