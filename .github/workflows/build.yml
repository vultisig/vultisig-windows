name: Vultisig build

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  actions: write

env:
  NODE_OPTIONS: '--max-old-space-size=8192'
  NODE_VERSION: '23.7.0'
  YARN_VERSION: '4.6.0'

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare vultisig-sdk from main (patch package.json)
        uses: ./.github/actions/prepare-vultisig-sdk-from-main
        with:
          yarn-version: ${{ env.YARN_VERSION }}

      - name: Setup and install
        uses: ./.github/actions/setup-yarn-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          immutable-install: 'false'

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/eslint
          key: ${{ runner.os }}-eslint-${{ hashFiles('**/yarn.lock', 'eslint.config.mjs', 'clients/desktop/eslint.config.mjs') }}

      - name: Validate public files
        run: yarn workspace @core/ui validate-public

      - name: Check for unused code
        run: yarn knip

      - name: Lint
        run: yarn lint

      - name: Run unit tests (core/lib)
        run: yarn test

      - name: Run unit tests (extension)
        run: yarn exec vitest run --config clients/extension/tests/unit/vitest.config.ts

      - name: Run typecheck
        run: yarn typecheck

  extension:
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare vultisig-sdk from main (patch package.json)
        uses: ./.github/actions/prepare-vultisig-sdk-from-main
        with:
          yarn-version: ${{ env.YARN_VERSION }}

      - name: Setup and install
        uses: ./.github/actions/setup-yarn-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          immutable-install: 'false'

      - name: Build extension
        run: yarn workspace @clients/extension build

      - name: Upload dist to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist-${{ github.sha }}
          path: clients/extension/dist

  build:
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        build:
          - name: 'App'
            platform: 'linux/amd64'
            os: 'ubuntu-22.04'
          - name: 'App'
            platform: 'windows/amd64'
            os: 'windows-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare vultisig-sdk from main (patch package.json)
        if: matrix.build.os != 'windows-latest'
        uses: ./.github/actions/prepare-vultisig-sdk-from-main
        with:
          yarn-version: ${{ env.YARN_VERSION }}

      - name: Setup and install
        uses: ./.github/actions/setup-yarn-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          immutable-install: ${{ matrix.build.os == 'windows-latest' && 'true' || 'false' }}

      # Wails NSIS packaging requires makensis on PATH (not preinstalled on windows-latest).
      - name: Install NSIS
        if: matrix.build.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisDir = Join-Path ${env:ProgramFiles(x86)} 'NSIS'
          if (-not (Test-Path (Join-Path $nsisDir 'makensis.exe'))) {
            $nsisDir = Join-Path $env:ProgramFiles 'NSIS'
          }
          if (-not (Test-Path (Join-Path $nsisDir 'makensis.exe'))) {
            throw 'makensis.exe not found after choco install nsis'
          }
          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir

      - name: Build wails
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          # package = upload build/bin artifacts; nsis = pass -nsis to wails build (Windows installer).
          package: ${{ matrix.build.os == 'windows-latest' }}
          nsis: ${{ matrix.build.os == 'windows-latest' }}

      - name: Smoke test Windows installer
        if: matrix.build.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $installer = Get-ChildItem -Path . -Filter '*installer.exe' -Recurse |
            Where-Object { $_.FullName -notmatch '\\node_modules\\' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw 'Windows installer was not produced.'
          }

          $install = Start-Process -FilePath $installer.FullName -ArgumentList '/S' -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "Installer failed with exit code $($install.ExitCode)."
          }

          $installDir = Join-Path $env:ProgramFiles 'Vultisig\Vultisig'
          $uninstaller = Join-Path $installDir 'uninstall.exe'
          if (-not (Test-Path $uninstaller)) {
            throw "Uninstaller was not created at $uninstaller."
          }

          $appData = [Environment]::GetFolderPath('ApplicationData')
          $localAppData = [Environment]::GetFolderPath('LocalApplicationData')
          $sentinelFiles = @(
            (Join-Path $installDir 'vultisig.db'),
            (Join-Path $installDir 'vultisig.db-wal'),
            (Join-Path $installDir 'vultisig.db-shm'),
            (Join-Path $localAppData 'VirtualStore\Program Files\Vultisig\Vultisig\vultisig.db'),
            (Join-Path $localAppData 'VirtualStore\Program Files\Vultisig\Vultisig\vultisig.db-wal'),
            (Join-Path $localAppData 'VirtualStore\Program Files\Vultisig\Vultisig\vultisig.db-shm'),
            (Join-Path $localAppData 'VirtualStore\Program Files (x86)\Vultisig\Vultisig\vultisig.db'),
            (Join-Path $localAppData 'VirtualStore\Program Files (x86)\Vultisig\Vultisig\vultisig.db-wal'),
            (Join-Path $localAppData 'VirtualStore\Program Files (x86)\Vultisig\Vultisig\vultisig.db-shm')
          )
          $sentinelDirs = @(
            (Join-Path $appData 'Vultisig'),
            (Join-Path $appData 'Vultisig.exe'),
            (Join-Path $localAppData 'Vultisig'),
            (Join-Path $localAppData 'Vultisig.exe')
          )

          foreach ($path in $sentinelFiles) {
            New-Item -ItemType Directory -Force -Path (Split-Path $path) | Out-Null
            New-Item -ItemType File -Force -Path $path | Out-Null
          }
          foreach ($path in $sentinelDirs) {
            New-Item -ItemType Directory -Force -Path $path | Out-Null
            New-Item -ItemType File -Force -Path (Join-Path $path 'sentinel.txt') | Out-Null
          }

          $uninstall = Start-Process -FilePath $uninstaller -ArgumentList '/S' -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) {
            throw "Uninstaller failed with exit code $($uninstall.ExitCode)."
          }

          $leftovers = @(($sentinelFiles + $sentinelDirs) | Where-Object { Test-Path $_ })
          if ($leftovers.Count -gt 0) {
            throw "Uninstaller left app data behind: $($leftovers -join ', ')"
          }
