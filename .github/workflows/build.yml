name: Vultisig build

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_OPTIONS: '--max-old-space-size=8192'
  NODE_VERSION: '23.7.0'
  YARN_VERSION: '4.6.0'

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: yarn install

      - name: Validate public files
        run: yarn workspace @core/ui validate-public

      - name: Check for unused code
        run: yarn knip

      - name: Lint
        run: yarn lint

      - name: Run unit tests (core/lib)
        run: yarn test

      - name: Run unit tests (extension)
        run: cd clients/extension && npx vitest run --config tests/unit/vitest.config.ts

      - name: Run typecheck
        run: yarn typecheck

  extension:
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: yarn install

      - name: Build extension
        run: yarn workspace @clients/extension build

      - name: Upload dist to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist-${{ github.sha }}
          path: clients/extension/dist

  sdk-compat:
    needs: lint
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-sdk-compat-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-sdk-compat-

      - name: Install dependencies
        run: yarn install

      - name: Override SDK to main branch
        run: yarn add @vultisig/sdk@https://github.com/vultisig/vultisig-sdk.git#main

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

  build:
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        build:
          - name: 'App'
            platform: 'linux/amd64'
            os: 'ubuntu-22.04'
          - name: 'App'
            platform: 'windows/amd64'
            os: 'windows-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: yarn install

      - name: Build wails
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: false
