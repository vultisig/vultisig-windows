name: Vultisig build

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  actions: write

env:
  NODE_OPTIONS: '--max-old-space-size=8192'
  NODE_VERSION: '23.7.0'
  YARN_VERSION: '4.6.0'

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare vultisig-sdk from main (patch package.json)
        uses: ./.github/actions/prepare-vultisig-sdk-from-main
        with:
          yarn-version: ${{ env.YARN_VERSION }}

      - name: Setup and install
        uses: ./.github/actions/setup-yarn-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          immutable-install: 'false'

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/eslint
          key: ${{ runner.os }}-eslint-${{ hashFiles('**/yarn.lock', 'eslint.config.mjs', 'clients/desktop/eslint.config.mjs') }}

      - name: Validate public files
        run: yarn workspace @core/ui validate-public

      - name: Check for unused code
        run: yarn knip

      - name: Lint
        run: yarn lint

      - name: Run unit tests (core/lib)
        run: yarn test

      - name: Run unit tests (extension)
        run: yarn exec vitest run --config clients/extension/tests/unit/vitest.config.ts

      - name: Run typecheck
        run: yarn typecheck

  extension:
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare vultisig-sdk from main (patch package.json)
        uses: ./.github/actions/prepare-vultisig-sdk-from-main
        with:
          yarn-version: ${{ env.YARN_VERSION }}

      - name: Setup and install
        uses: ./.github/actions/setup-yarn-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          immutable-install: 'false'

      - name: Build extension
        run: yarn workspace @clients/extension build

      - name: Upload dist to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist-${{ github.sha }}
          path: clients/extension/dist

  build:
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        build:
          - name: 'App'
            platform: 'linux/amd64'
            os: 'ubuntu-22.04'
          - name: 'App'
            platform: 'windows/amd64'
            os: 'windows-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare vultisig-sdk from main (patch package.json)
        if: matrix.build.os != 'windows-latest'
        uses: ./.github/actions/prepare-vultisig-sdk-from-main
        with:
          yarn-version: ${{ env.YARN_VERSION }}

      - name: Setup and install
        uses: ./.github/actions/setup-yarn-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}
          immutable-install: ${{ matrix.build.os == 'windows-latest' && 'true' || 'false' }}

      - name: Build wails
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: false
