name: Vultisig build

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  actions: write

env:
  NODE_OPTIONS: '--max-old-space-size=8192'
  NODE_VERSION: '23.7.0'
  YARN_VERSION: '4.6.0'

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup and install
        uses: ./.github/actions/setup-yarn-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/eslint
          key: ${{ runner.os }}-eslint-${{ hashFiles('**/yarn.lock', 'eslint.config.mjs', 'clients/desktop/eslint.config.mjs') }}

      - name: Clone and build SDK main
        env:
          GIT_LFS_SKIP_SMUDGE: '1'
        run: |
          git clone --depth 1 -b fix/noble-hashes-v2-sha256-compat https://github.com/vultisig/vultisig-sdk.git /tmp/vultisig-sdk
          cd /tmp/vultisig-sdk
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate
          yarn install
          yarn build:shared
          yarn build:all

      - name: Override SDK packages with main branch
        run: |
          mkdir -p /tmp/sdk-packs
          for dir in packages/sdk packages/core/chain packages/core/config packages/core/mpc packages/lib/utils packages/mpc-types packages/mpc-wasm; do
            cd /tmp/vultisig-sdk/$dir && npm pack --pack-destination /tmp/sdk-packs
          done
          cd $GITHUB_WORKSPACE
          PACK_DIR=/tmp/sdk-packs node - <<'NODE'
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');
            const packDir = process.env.PACK_DIR;
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const packs = fs.readdirSync(packDir).filter(f => f.endsWith('.tgz'));
            const resolutions = pkg.resolutions || {};
            const dependencies = pkg.dependencies || {};
            // Packages not declared by any workspace; resolutions can't
            // introduce new deps so they must be added at the root.
            const NEW_ROOT_DEPS = new Set([
              '@vultisig/mpc-types',
              '@vultisig/mpc-wasm',
            ]);
            for (const tgz of packs) {
              const tgzPath = path.join(packDir, tgz);
              const manifest = execFileSync(
                'tar',
                ['-xzf', tgzPath, '-O', 'package/package.json'],
                { encoding: 'utf8' }
              );
              const name = JSON.parse(manifest).name;
              resolutions[name] = tgzPath;
              if (NEW_ROOT_DEPS.has(name)) {
                dependencies[name] = tgzPath;
              }
            }
            pkg.resolutions = resolutions;
            pkg.dependencies = dependencies;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE
          YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Validate public files
        run: yarn workspace @core/ui validate-public

      - name: Check for unused code
        run: yarn knip

      - name: Lint
        run: yarn lint

      - name: Run unit tests (core/lib)
        run: yarn test

      - name: Run unit tests (extension)
        run: yarn exec vitest run --config clients/extension/tests/unit/vitest.config.ts

      - name: Run typecheck
        run: yarn typecheck

  extension:
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup and install
        uses: ./.github/actions/setup-yarn-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clone and build SDK main
        env:
          GIT_LFS_SKIP_SMUDGE: '1'
        run: |
          git clone --depth 1 -b fix/noble-hashes-v2-sha256-compat https://github.com/vultisig/vultisig-sdk.git /tmp/vultisig-sdk
          cd /tmp/vultisig-sdk
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate
          yarn install
          yarn build:shared
          yarn build:all

      - name: Override SDK packages with main branch
        run: |
          mkdir -p /tmp/sdk-packs
          for dir in packages/sdk packages/core/chain packages/core/config packages/core/mpc packages/lib/utils packages/mpc-types packages/mpc-wasm; do
            cd /tmp/vultisig-sdk/$dir && npm pack --pack-destination /tmp/sdk-packs
          done
          cd $GITHUB_WORKSPACE
          PACK_DIR=/tmp/sdk-packs node - <<'NODE'
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');
            const packDir = process.env.PACK_DIR;
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const packs = fs.readdirSync(packDir).filter(f => f.endsWith('.tgz'));
            const resolutions = pkg.resolutions || {};
            const dependencies = pkg.dependencies || {};
            // Packages not declared by any workspace; resolutions can't
            // introduce new deps so they must be added at the root.
            const NEW_ROOT_DEPS = new Set([
              '@vultisig/mpc-types',
              '@vultisig/mpc-wasm',
            ]);
            for (const tgz of packs) {
              const tgzPath = path.join(packDir, tgz);
              const manifest = execFileSync(
                'tar',
                ['-xzf', tgzPath, '-O', 'package/package.json'],
                { encoding: 'utf8' }
              );
              const name = JSON.parse(manifest).name;
              resolutions[name] = tgzPath;
              if (NEW_ROOT_DEPS.has(name)) {
                dependencies[name] = tgzPath;
              }
            }
            pkg.resolutions = resolutions;
            pkg.dependencies = dependencies;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE
          YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Build extension
        run: yarn workspace @clients/extension build

      - name: Upload dist to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist-${{ github.sha }}
          path: clients/extension/dist

  build:
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        build:
          - name: 'App'
            platform: 'linux/amd64'
            os: 'ubuntu-22.04'
          - name: 'App'
            platform: 'windows/amd64'
            os: 'windows-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup and install
        uses: ./.github/actions/setup-yarn-monorepo
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clone SDK
        env:
          GIT_LFS_SKIP_SMUDGE: '1'
        shell: bash
        run: git clone --depth 1 https://github.com/vultisig/vultisig-sdk.git "$RUNNER_TEMP/vultisig-sdk"

      - name: Build SDK
        shell: bash {0}
        working-directory: ${{ runner.temp }}/vultisig-sdk
        run: |
          corepack enable
          corepack install
          yarn install || true
          yarn build:shared
          if [ "$RUNNER_OS" != "Windows" ]; then
            yarn build:all
          fi

      - name: Override SDK packages
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/sdk-packs"
          for dir in packages/core/chain packages/core/config packages/core/mpc packages/lib/utils packages/mpc-types packages/mpc-wasm; do
            cd "$RUNNER_TEMP/vultisig-sdk/$dir" && npm pack --pack-destination "$RUNNER_TEMP/sdk-packs"
          done
          cd "$GITHUB_WORKSPACE"
          PACK_DIR="$RUNNER_TEMP/sdk-packs" node - <<'NODE'
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');
            const packDir = process.env.PACK_DIR;
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const packs = fs.readdirSync(packDir).filter(f => f.endsWith('.tgz'));
            const resolutions = pkg.resolutions || {};
            const dependencies = pkg.dependencies || {};
            const NEW_ROOT_DEPS = new Set([
              '@vultisig/mpc-types',
              '@vultisig/mpc-wasm',
            ]);
            for (const tgz of packs) {
              const tgzPath = path.join(packDir, tgz);
              const manifest = execFileSync(
                'tar',
                ['--force-local', '-xzf', tgzPath, '-O', 'package/package.json'],
                { encoding: 'utf8' }
              );
              const name = JSON.parse(manifest).name;
              resolutions[name] = tgzPath;
              if (NEW_ROOT_DEPS.has(name)) {
                dependencies[name] = tgzPath;
              }
            }
            pkg.resolutions = resolutions;
            pkg.dependencies = dependencies;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE
          YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Build wails
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: false
